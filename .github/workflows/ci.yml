name: CI - Lint and Test

on:
  pull_request:
    branches:
      - main
      - develop
  push:
    branches:
      - main
      - develop

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — VALIDATE MODULE MANIFEST
  # ─────────────────────────────────────────
  validate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate Module Manifest
        shell: pwsh
        run: |
          $result = Test-ModuleManifest -Path .\PSWinOps.psd1 -ErrorAction Stop
          Write-Output "[OK] Module manifest is valid"
          Write-Output "Module : $($result.Name)"
          Write-Output "Version: $($result.Version)"
          Write-Output "Author : $($result.Author)"

  # ─────────────────────────────────────────
  # JOB 2 — LINT
  # ─────────────────────────────────────────
  lint:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules
          key: psmodules-psscriptanalyzer-${{ runner.os }}

      - name: Lint with PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          }

          $files = Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1 |
            Where-Object { $_.FullName -notmatch '[\\/](Tests|\.git|output)[\\/]' }

          Write-Output "[INFO] Analyzing $($files.Count) file(s)..."

          $results = $files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error, Warning
          }

          if ($results) {
            $results | Format-Table -AutoSize
            $errorCount   = ($results | Where-Object { $_.Severity -eq 'Error'   }).Count
            $warningCount = ($results | Where-Object { $_.Severity -eq 'Warning' }).Count
            throw "[FAIL] PSScriptAnalyzer found $errorCount error(s) and $warningCount warning(s)"
          }

          Write-Output "[OK] Linting passed - zero errors and warnings"

  # ─────────────────────────────────────────
  # JOB 3 — TESTS (parallel matrix by category)
  # ─────────────────────────────────────────
  test:
    needs: [validate, lint]
    runs-on: windows-latest
    strategy:
      fail-fast: true
      matrix:
        suite:
          - { name: "Private",            path: "Tests/Private" }
          - { name: "Public/healthcheck", path: "Tests/Public/healthcheck" }
          - { name: "Public/network",     path: "Tests/Public/network" }
          - { name: "Public/ntp",         path: "Tests/Public/ntp" }
          - { name: "Public/proxy",       path: "Tests/Public/proxy" }
          - { name: "Public/rdp",         path: "Tests/Public/rdp" }
          - { name: "Public/system",      path: "Tests/Public/system" }
          - { name: "Public/utils",       path: "Tests/Public/utils" }

    steps:
      - uses: actions/checkout@v4

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules
          key: psmodules-pester5-${{ runner.os }}

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.7' })) {
            Install-Module -Name Pester -MinimumVersion 5.7 -Force -SkipPublisherCheck
          }

      - name: Run tests - ${{ matrix.suite.name }}
        shell: pwsh
        run: |
          $safeName = "${{ matrix.suite.name }}" -replace '[/\\]', '-'

          $config = New-PesterConfiguration
          $config.Run.Path                = '.\${{ matrix.suite.path }}'
          $config.Output.Verbosity        = 'Normal'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = "TestResults-$safeName.xml"
          $config.TestResult.OutputFormat = 'NUnitXml'

          $result = Invoke-Pester -Configuration $config

          Write-Output "[INFO] [${{ matrix.suite.name }}] $($result.PassedCount) passed, $($result.FailedCount) failed"

          if ($result.FailedCount -gt 0) {
            throw "[FAIL] $($result.FailedCount) test(s) failed in suite '${{ matrix.suite.name }}'"
          }

          Write-Output "[OK] Suite '${{ matrix.suite.name }}' passed"

          if ($result.FailedCount -gt 0) {
            throw "[FAIL] $($result.FailedCount) test(s) failed in suite '${{ matrix.suite.name }}'"
          }

          Write-Output "[OK] Suite '${{ matrix.suite.name }}' passed"

      - name: Upload test results - ${{ matrix.suite.name }}
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ strategy.job-index }}
          path: TestResults-*.xml
          retention-days: 30

  # ─────────────────────────────────────────
  # JOB 4 — PUBLISH COMBINED RESULTS
  # ─────────────────────────────────────────
  publish-results:
    needs: test
    runs-on: windows-latest
    if: always()
    permissions:
      checks: write
      pull-requests: write

    steps:
      - name: Download all test artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: test-results-*
          merge-multiple: true
          path: all-results

      - name: Publish combined test results
        uses: EnricoMi/publish-unit-test-result-action/windows@v2
        with:
          files: all-results/**/*.xml
          check_name: Pester Test Results

  # ─────────────────────────────────────────
  # JOB 5 — CODE COVERAGE (only if all tests pass)
  # ─────────────────────────────────────────
  coverage:
    needs: test
    runs-on: windows-latest
    if: success()

    steps:
      - uses: actions/checkout@v4

      - name: Cache PowerShell modules
        uses: actions/cache@v4
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules
          key: psmodules-pester5-${{ runner.os }}

      - name: Install Pester
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.0' })) {
            Install-Module -Name Pester -MinimumVersion 5.0 -Force -SkipPublisherCheck
          }

      - name: Run Pester with code coverage
        shell: pwsh
        run: |
          $config = New-PesterConfiguration
          $config.Run.Path                  = '.\Tests'
          $config.Output.Verbosity          = 'None'
          $config.CodeCoverage.Enabled      = $true
          $config.CodeCoverage.Path         = @(
              '.\PSWinOps.psm1',
              '.\Public\**\*.ps1',
              '.\Private\*.ps1'
          )
          $config.CodeCoverage.OutputPath   = 'coverage.xml'
          $config.CodeCoverage.OutputFormat = 'JaCoCo'

          Invoke-Pester -Configuration $config

      - name: Generate coverage summary
        shell: pwsh
        run: |
          if (Test-Path -Path 'coverage.xml') {
            [xml]$coverage  = Get-Content -Path 'coverage.xml'
            $lineCounter    = $coverage.report.counter | Where-Object { $_.type -eq 'LINE' }
            $covered        = [int]$lineCounter.covered
            $missed         = [int]$lineCounter.missed
            $total          = $covered + $missed
            if ($total -gt 0) {
              $pct = [math]::Round(($covered / $total) * 100, 2)
              Write-Output "[INFO] Code coverage: $pct% ($covered/$total lines)"
            }
          }

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: coverage.xml
          flags: pester
          fail_ci_if_error: false
          verbose: true

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage.xml
          retention-days: 30