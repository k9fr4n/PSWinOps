name: Publish PSWinOps to PSGallery

on:
  push:
    tags:
      - "v*"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  # ─────────────────────────────────────────
  # JOB 1 — VALIDATION
  # ─────────────────────────────────────────
  validate:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Output "Publishing version: $version"
          Add-Content -Path $env:GITHUB_ENV -Value "MODULE_VERSION=$version" -Encoding UTF8

      - name: Check version consistency
        shell: pwsh
        run: |
          $manifest = Import-PowerShellDataFile -Path .\PSWinOps.psd1
          $manifestVersion = $manifest.ModuleVersion
          $tagVersion = "${{ env.MODULE_VERSION }}"

          if ($manifestVersion -ne $tagVersion) {
            throw "[ERROR] Version mismatch: tag=$tagVersion but psd1=$manifestVersion"
          }

          Write-Output "[OK] Version consistency validated: $manifestVersion"

      - name: Cache PowerShell modules
        uses: actions/cache@v4.2.3
        with:
          path: C:\Users\runneradmin\Documents\PowerShell\Modules
          key: psmodules-publish-${{ runner.os }}

      - name: Lint with PSScriptAnalyzer
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name PSScriptAnalyzer)) {
            Install-Module -Name PSScriptAnalyzer -Force -SkipPublisherCheck
          }

          $files = Get-ChildItem -Path . -Recurse -Include *.ps1, *.psm1 |
            Where-Object { $_.FullName -notmatch '[\\/](Tests|\.git|output)[\\/]' }

          $results = $files | ForEach-Object {
            Invoke-ScriptAnalyzer -Path $_.FullName -Severity Error, Warning
          }

          if ($results) {
            $results | Format-Table -AutoSize
            throw "[FAIL] PSScriptAnalyzer found $($results.Count) issue(s)"
          }

          Write-Output "[OK] Linting passed"

      - name: Run Pester Tests
        shell: pwsh
        run: |
          if (-not (Get-Module -ListAvailable -Name Pester | Where-Object { $_.Version -ge '5.7' })) {
            Install-Module -Name Pester -MinimumVersion 5.7 -Force -SkipPublisherCheck
          }

          $config = New-PesterConfiguration
          $config.Run.Path                = '.\Tests'
          $config.Output.Verbosity        = 'Normal'
          $config.TestResult.Enabled      = $true
          $config.TestResult.OutputPath   = 'TestResults.xml'
          $config.TestResult.OutputFormat = 'NUnitXml'

          $result = Invoke-Pester -Configuration $config

          Write-Output "[INFO] $($result.PassedCount) passed, $($result.FailedCount) failed"

          if ($result.FailedCount -gt 0) {
            throw "[FAIL] $($result.FailedCount) test(s) failed"
          }

          Write-Output "[OK] All tests passed"

      - name: Upload test results
        uses: actions/upload-artifact@v4.6.2
        if: always()
        with:
          name: test-results
          path: TestResults.xml
          retention-days: 30

      - name: Validate Module Manifest
        shell: pwsh
        run: |
          $result = Test-ModuleManifest -Path .\PSWinOps.psd1 -ErrorAction Stop
          Write-Output "Module : $($result.Name)"
          Write-Output "Version: $($result.Version)"
          Write-Output "Author : $($result.Author)"

  # ─────────────────────────────────────────
  # JOB 2 — PUBLICATION
  # ─────────────────────────────────────────
  publish:
    needs: validate
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Extract version from tag
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $version = $tag.TrimStart('v')
          Write-Output "Publishing version: $version"
          Add-Content -Path $env:GITHUB_ENV -Value "MODULE_VERSION=$version" -Encoding UTF8

      - name: Stage module for publication
        shell: pwsh
        run: |
          $staging = Join-Path $env:RUNNER_TEMP 'PSWinOps'
          $exclude = @('.git', '.github', 'Tests', '.devcontainer', 'build.ps1', 'coverage.xml', 'output', 'TestResults*.xml')
          New-Item -Path $staging -ItemType Directory -Force | Out-Null
          Get-ChildItem -Path . -Force | Where-Object { $exclude -notcontains $_.Name } |
              Copy-Item -Destination $staging -Recurse -Force
          "STAGING_PATH=$staging" | Out-File -Append $env:GITHUB_ENV

      - name: Publish to PSGallery
        shell: pwsh
        env:
          PSGALLERY_API_KEY: ${{ secrets.PSGALLERY_API_KEY }}
        run: |
          Publish-Module -Path $env:STAGING_PATH -NuGetApiKey $env:PSGALLERY_API_KEY -Repository PSGallery -Verbose

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2.3.2
        with:
          tag_name: ${{ github.ref_name }}
          name: "PSWinOps ${{ github.ref_name }}"
          generate_release_notes: true